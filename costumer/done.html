<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สดชื่น</title>
    <script src="https://kit.fontawesome.com/e35c90909d.js" crossorigin="anonymous"></script>
    <link href="../src/output.css" rel="stylesheet">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
</head>
<body class="bg-neutral-100 min-h-screen">

    <!-- Bar ข้างบนที่เป็นโลโก้ + คิวก่อนหน้่า -->
    <nav class=" bg-green-400 shadow-lg">
        <div class="flex justify-between items-center px-6 py-4">

            <!-- ส่วนโลโก้ ฝั่งซ้าย -->
            <div class="flex flex-row items-center space-x-3">
                <img src="../img/logo.png" alt="Logo" class="w-20 rounded-full">
                <div class="text-white">
                    <p class="text-xl font-bold">ร้านสดชื่น</p>
                    <p class="text-base font-light">หน้าม.พะเยา</p>
                </div>
            </div>

            <!-- ส่วนคิวที่รอ ฝั่งขวา -->
            <div class="bg-green-500 p-2 rounded-full flex items-center mr-3 ">
                <p class="text-white text-lg font-semibold mx-2 max-[390px]:hidden">คิวที่รอ</p>
                <span
                    class="bg-orange-500 inline-flex items-center justify-center text-black font-bold rounded-full w-10 h-10"
                    role="button">5</span>
            </div>

        </div>
    </nav>

    <main class="max-w-[640px] mx-auto pb-28 pt-16">
        <div class="flex flex-col items-center justify-center">

            <p class="text-3xl font-bold text-green-500 mb-8">ทำรายการสำเร็จ</p>
            <span class="bg-white/20 rounded-full flex justify-center items-center w-24 h-24  border-2 border-black">
                <span class="bg-green-500 rounded-full flex justify-center items-center w-16 h-16">
                    <i class="fa-solid fa-check text-white text-4xl"></i>
                </span>
            </span>

            <div class="space-y-2 my-8 px-6">
                <div class="flex justify-center space-x-1">
                    <p class="text-base font-light">อาหารของคุณจะเสร็จภายใน
                        <p class="text-base font-bold text-green-500">10 นาที</p>
                    </p>
                </div>
                <hr class="border-gray-300">
                <div class="flex justify-center space-x-1">
                    <p class="text-base font-bold">ขอบคุณที่ใช้บริการร้าน
                        <p class="text-base font-bold text-green-500">สดชื่น</p>
                    </p>
                </div>
            </div>

            <button class="bg-green-500 rounded-full flex justify-center items-center pr-4 py-2 space-x-2 shadow-lg hover:bg-green-700 transition">
                <i class="fa-solid fa-face-smile text-white text-3xl pl-2"></i>
                <p class="text-white text-xl font-semibold p-1">กลับไปหน้าเมนูอาหาร</p>
            </button>
        </div>

    </main>

</body>
</html>
