<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สดชื่น</title>
  <script src="https://kit.fontawesome.com/e35c90909d.js" crossorigin="anonymous"></script>
  <link href="../src/output.css" rel="stylesheet">
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
</head>

<body class="bg-neutral-100 min-h-screen">

  <!-- Bar ข้างบนที่เป็นโลโก้ + คิวก่อนหน้่า -->
  <nav class=" bg-green-400 shadow-lg">
    <div class="flex justify-between items-center px-6 py-4">

      <!-- ส่วนโลโก้ ฝั่งซ้าย -->
      <div class="flex flex-row items-center space-x-3">
        <img src="../img/logo.png" alt="Logo" class="w-20 rounded-full">
        <div class="text-white">
          <p class="text-xl font-bold">ร้านสดชื่น</p>
          <p class="text-base font-light">หน้าม.พะเยา</p>
        </div>
      </div>

      <!-- ส่วนคิวที่รอ ฝั่งขวา -->
      <div class="bg-green-500 p-2 rounded-full flex items-center mr-3 ">
        <p class="text-white text-lg font-semibold mx-2 max-[390px]:hidden">คิวที่รอ</p>
        <span class="bg-orange-500 inline-flex items-center justify-center text-black font-bold rounded-full w-10 h-10"
          role="button">5</span>
      </div>

    </div>
  </nav>

  <main class="max-w-[640px] mx-auto pb-28">

    <!-- กลับไปหน้าเมนู -->
    <div class="px-6 pt-8 flex items-center space-x-2">
      <a href="./home.html">
        <i class="fa-solid fa-chevron-left hover:cursor-pointer"></i>
      </a>
      <p class="text-xl font-bold">กลับไปยังหน้าเมนู</p>
    </div>

    <!-- รายละเอียดเมนู -->
    <div class="p-6">
      <img src="../img/food.jpg" alt="food" class="w-full h-48 object-cover rounded-3xl">

      <!-- ส่วนการ์ดขาวที่เป็นเนื้อหา -->
      <div class="bg-white p-8 mt-4 rounded-3xl shadow-lg">

        <!-- กล่อง1 -->
        <div class="flex justify-between pb-6">
          <p class="text-xl font-bold">ข้าวผัด</p>
          <p class="text-xl font-bold text-amber-500">50 <span class="text-base font-light text-black">บาท</span></p>
        </div>

        <!-- ระดับความเผ็ด -->
        <div class="pb-6">
          <p class="pb-1">ระดับความเผ็ด</p>
          <form class="space-y-2">
            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="spicy1" name="spice" value="spicy1" required>
              <label for="spicy1">เผ็ดมาก</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="spicy2" name="spice" value="spicy2">
              <label for="spicy2">เผ็ดน้อย</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="spicy3" name="spice" value="spicy3">
              <label for="spicy3">ไม่เผ็ด</label>
            </div>
          </form>
        </div>

        <!-- ประเภทเนื้อสัตว์ -->
        <div class="pb-6">
          <p class="pb-1">ประเภทเนื้อสัตว์</p>
          <form class="space-y-2">
            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="minced" name="meat" value="minced" required>
              <label for="minced">หมูสับ</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="slice" name="meat" value="slice">
              <label for="slice">หมูชิ้น</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="belly" name="meat" value="belly">
              <label for="belly">หมูสามชั้น</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="chicken" name="meat" value="chicken">
              <label for="chicken">ไก่ชิ้น</label>
            </div>
          </form>
        </div>

        <!-- พิเศษ ธรรมดา -->
        <div class="pb-6">
          <p class="pb-1">ระดับปริมาณ</p>
          <form class="space-y-2">
            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="normal" name="size" value="normal" required>
              <label for="normal">ธรรมดา</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="extra" name="size" value="extra">
              <label for="extra">พิเศษ</label>
            </div>
          </form>
        </div>

        <!-- กลับบ้านหรือทานที่นี่ -->
        <div class="pb-6">
          <p class="pb-1">เพิ่มเติม</p>
          <form class="space-y-2">
            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="back-home" name="eat-where" value="back-home" required>
              <label for="back-home">กลับบ้าน</label>
            </div>

            <div class="border border-gray-300 rounded-lg px-4 py-2 flex items-center space-x-2 hover:bg-gray-100 transition">
              <input type="radio" id="eat-here" name="eat-where" value="eat-here">
              <label for="eat-here">ทานที่นี่</label>
            </div>
          </form>
        </div>

        
        <!-- คำขอเพิ่มเติม -->
        <div class="pb-6">
          <p class="pb-1">คำขอเพิ่มเติม</p>
          <input type="text" id="req" name="req" placeholder="ระบุคำขอเพิ่มเติม"
            class="border border-gray-300 rounded-lg px-1 py-1 w-full" />
        </div>

        <!-- เพิ่มจำนวน -->
        <div class="px-6 pt-4 pb-8 flex justify-between space-x-2">
          <p class="text-xl font-medium">จำนวน</p>
          <div class="bg-neutral-300 rounded-full p-1 flex justify-between items-center space-x-4">
            <button class=" bg-white rounded-full w-6 h-6 flex items-center justify-center cursor-pointer"><i class="fa-solid fa-minus text-sm"></i></button>
            <span class="font-medium">1</span>
            <button class=" bg-amber-500 rounded-full w-6 h-6 flex items-center justify-center cursor-pointer"> <i class="fa-solid fa-plus text-sm"></i></button>
          </div>
        </div>

        <!-- ยอดรวม -->
        <div class="flex justify-between px-6 pb-6">
          <p class="text-xl font-bold">รวม</p>
          <p class="text-xl font-bold text-amber-500">50 บาท</p>
        </div>

        <!-- ปุ่มเพิ่มลงตระกล้า -->
        <div class="flex justify-center px-6 ">
          <button class=" bg-green-500 text-white font-medium text-xl rounded-3xl w-full h-14 hover:bg-green-700 transition cursor-pointer">เพิ่มไปยังตระกล้า</button>
        </div>

      </div>
  </main>

  <!-- ตระกล้าของฉัน -->
  <a href="./cart.html">
    <div class="p-6 fixed bottom-0 left-0 right-0 sm:hidden">
      <div class="bg-amber-500 rounded-full p-2 flex space-x-4 items-center hover:bg-amber-600 cursor-pointer">
        <span class="bg-white rounded-full w-12 h-12 inline-flex items-center justify-center text-2xl font-medium">0</span>
        <p class="text-xl font-semibold text-white flex-1 text-center">ตระกร้าของฉัน</p>
        <p class="text-xl font-semibold text-white pr-4">0 บาท</p>
      </div>
    </div>
  </a>

</body>
</html>
