<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สดชื่น</title>
    <script src="https://kit.fontawesome.com/e35c90909d.js" crossorigin="anonymous"></script>
    <link href="../src/output.css" rel="stylesheet">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
</head>

<body class="bg-neutral-100 min-h-screen">

    <!-- Bar ข้างบนที่เป็นโลโก้ + คิวก่อนหน้่า -->
    <nav class=" bg-green-400 shadow-lg">
        <div class="flex justify-between items-center px-6 py-4">

            <!-- ส่วนโลโก้ ฝั่งซ้าย -->
            <div class="flex flex-row items-center space-x-3">
                <img src="../img/logo.png" alt="Logo" class="w-20 rounded-full">
                <div class="text-white">
                    <p class="text-xl font-bold">ร้านสดชื่น</p>
                    <p class="text-base font-light">หน้าม.พะเยา</p>
                </div>
            </div>

            <!-- ส่วนคิวที่รอ ฝั่งขวา -->
            <div class="bg-green-500 p-2 rounded-full flex items-center mr-3 ">
                <p class="text-white text-lg font-semibold mx-2 max-[390px]:hidden">คิวที่รอ</p>
                <span
                    class="bg-orange-500 inline-flex items-center justify-center text-black font-bold rounded-full w-10 h-10"
                    role="button">5</span>
            </div>

        </div>
    </nav>

    <!-- ส่วนกลับไปหน้าเมนู -->
    <div class="px-6 pt-8 flex items-center space-x-2">
        <i class="fa-solid fa-chevron-left hover:cursor-pointer"></i>
        <p class="text-xl font-bold">กลับไปยังหน้าเมนู</p>
    </div>

    <!-- ส่วนรายการอาหารที่สั่ง -->
    <main class="p-6 pt-8 pb-[240px]">
        <p class="text-lg font-bold pb-4">รายการอาหาร</p>

        <div class="flex flex-col gap-4">
            <!-- การ์ดอาหารที่สั่ง -->
            <div class="bg-white rounded-2xl shadow-lg p-4 flex items-center space-x-4">
                <p class="text-md font-medium">1.</p>
                <img src="../img/food.jpg" alt="food" class="w-18 h-auto object-cover rounded-xl">
                <div class="flex-1">
                    <p class="text-base font-medium">ข้าวผัด</p>
                    <p class="text-xs font-normal text-gray-400">ไม่เผ็ด, ทานที่นี่, หมูสับ</p>
                </div>
                <p class="text-md font-medium text-amber-500">50 บาท</p>
                <div>
                    <button class="bg-red-500 text-white ml-auto flex justify-center items-center rounded-full w-8 h-8 hover:cursor-pointer">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-4 flex items-center space-x-4">
                <p class="text-md font-medium">2.</p>
                <img src="../img/food.jpg" alt="food" class="w-18 h-auto object-cover rounded-xl">
                <div class="flex-1">
                    <p class="text-base font-medium">ข้าวผัด</p>
                    <p class="text-xs font-normal text-gray-400">ไม่เผ็ด, ทานที่นี่, หมูสับ</p>
                </div>
                <p class="text-md font-medium text-amber-500">50 บาท</p>
                <div>
                    <button class="bg-red-500 text-white ml-auto flex justify-center items-center rounded-full w-8 h-8 hover:cursor-pointer">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-4 flex items-center space-x-4">
                <p class="text-md font-medium">3.</p>
                <img src="../img/food.jpg" alt="food" class="w-18 h-auto object-cover rounded-xl">
                <div class="flex-1">
                    <p class="text-base font-medium">ข้าวผัด</p>
                    <p class="text-xs font-normal text-gray-400">ไม่เผ็ด, ทานที่นี่, หมูสับ</p>
                </div>
                <p class="text-md font-medium text-amber-500">50 บาท</p>
                <div>
                    <button class="bg-red-500 text-white ml-auto flex justify-center items-center rounded-full w-8 h-8 hover:cursor-pointer">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- เพิ่มรายการ -->
         <div class="flex flex-col justify-center items-center space-y-2 mt-8 hover:cursor-pointer">
            <button class="rounded-full bg-gray-300 h-12 w-12 hover:cursor-pointer">
                <i class="fa-solid fa-plus"></i>
            </button>
            <p class="text-md font-light">เพิ่มรายการ</p>
         </div>

    </main>

    <!-- ตระกล้าของฉัน -->
    <div class="bg-white shadow-lg p-6 fixed bottom-0 left-0 right-0 md:px-20 lg:px-32 xl:px-48 2xl:px-64">
        <div class="flex justify-between w-64 mx-auto text-gray-400 text-md font-medium">
            <p>จำนวน</p>
            <p>3รายการ</p>
        </div>

        <div class="flex justify-between w-64 mx-auto text-lg font-bold pb-4">
            <p>รวม</p>
            <p class="text-amber-500">150 บาท</p>
        </div>

        <div class="bg-amber-500 rounded-full p-2 flex space-x-4 items-center hover:bg-amber-600 cursor-pointer">
            <span
                class="bg-white rounded-full w-12 h-12 inline-flex items-center justify-center text-2xl font-medium">0</span>
            <p class="text-xl font-semibold text-white flex-1 text-center">ตระกล้าของฉัน</p>
            <p class="text-xl font-semibold text-white pr-4">0 บาท</p>
        </div>
    </div>

</body>
</html>
