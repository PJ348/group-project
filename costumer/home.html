<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สดชื่น</title>
  <script src="https://kit.fontawesome.com/e35c90909d.js" crossorigin="anonymous"></script>
  <link href="../src/output.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-neutral-100 min-h-screen">

  <!-- Bar ข้างบนที่เป็นโลโก้ + คิวก่อนหน้่า -->
  <nav class=" bg-green-400 shadow-lg">
    <div class="flex justify-between items-center px-6 py-4">

      <!-- ส่วนโลโก้ ฝั่งซ้าย -->
      <div class="flex flex-row items-center space-x-3">
        <img src="../img/logo.png" alt="Logo" class="w-20 rounded-full">
        <div class="text-white">
          <p class="text-xl font-bold">ร้านสดชื่น</p>
          <p class="text-base font-light">หน้าม.พะเยา</p>
        </div>
      </div>

      <!-- ส่วนคิวที่รอ ฝั่งขวา -->
      <div class="flex justify-center items-center space-x-4">
        <a href="./cart.html">
          <i class="fa-solid fa-basket-shopping text-white text-xl max-sm:hidden"></i>
        </a>
        <div class="bg-green-500 p-2 rounded-full flex items-center mr-3">
          <p class="text-white text-lg font-semibold mx-2 max-[390px]:hidden">คิวที่รอ</p>
          <span
            class="bg-orange-500 inline-flex items-center justify-center text-black font-bold rounded-full w-10 h-10"
            role="button">5</span>
        </div>
      </div>

    </div>
  </nav>

  <!-- เมนูอาหาร -->
  <main class="pb-28">

    <!-- หัวข้อ -->
    <div class="px-6 pt-8">
      <p class="text-2xl font-bold">เมนูอาหาร</p>
      <p class="text-base font-light">เลือกเมนูที่คุณต้องการ</p>
    </div>

    <div class="grid grid-cols-2 gap-4 p-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7">
      <!-- การ์ดเมนู -->
      <div class="bg-white flex flex-col rounded-3xl shadow-lg hover:scale-105 transition-transform duration-300">
        <img src="../img/food-menu1.jpg" alt="food" class="w-full h-36 object-cover rounded-t-3xl">
        <div class="m-4 mr-6">
          <h2 class="text-xl font-bold max-[390px]:text-lg">ข้าวไข่ข้นกุ้ง</h2>
          <p class="text-orange-500 text-xl font-bold max-[390px]:text-lg">50
            <span class="text-base font-light text-black">บาท</span>
          </p>
        </div>    
        <div class="flex justify-end mt-auto">
          <a href="add-menu.html">
            <button class=" bg-green-500 text-white font-medium text-xl rounded-tl-3xl rounded-br-3xl w-14 h-14 hover:bg-green-700 transition max-[390px]:text-lg">เพิ่ม</button>
          </a>
        </div>
      </div>

      <div class="bg-white flex flex-col rounded-3xl shadow-lg hover:scale-105 transition-transform duration-300">
        <div class="relative">
          <img src="../img/food-menu2.jpg" alt="food" class="w-full h-36 object-cover rounded-t-3xl brightness-75">
          <div class="absolute flex inset-0 justify-center items-center">
            <div class="bg-gray-300/90 p-2 rounded-tl-3xl rounded-br-3xl"><p class="text-black font-medium">หมด</p></div>
          </div>
        </div>
        <div class="m-4 mr-6">
          <h2 class="text-xl font-bold max-[390px]:text-lg">ข้าวผัดไข่</h2>
          <p class="text-orange-500 text-xl font-bold max-[390px]:text-lg">50
            <span class="text-base font-light text-black">บาท</span>
          </p>
        </div>
        <div class="flex justify-end mt-auto">
          <button
            class=" bg-neutral-400 text-neutral-500 font-medium text-xl rounded-tl-3xl rounded-br-3xl w-14 h-14 max-[390px]:text-lg">เพิ่ม</button>
        </div>
      </div>

      <div class="bg-white flex flex-col rounded-3xl shadow-lg hover:scale-105 transition-transform duration-300">
        <img src="../img/food-menu3.jpg" alt="food" class="w-full h-36 object-cover rounded-t-3xl">
        <div class="m-4 mr-6">
          <h2 class="text-xl font-bold max-[390px]:text-lg">หมูสามชั้นผัดพริกเกลือ</h2>
          <p class="text-orange-500 text-xl font-bold max-[390px]:text-lg">50
            <span class="text-base font-light text-black">บาท</span>
          </p>
        </div>
        <div class="flex justify-end mt-auto">
          <button
            class=" bg-green-500 text-white font-medium text-xl rounded-tl-3xl rounded-br-3xl w-14 h-14 hover:bg-green-700 transition max-[390px]:text-lg">เพิ่ม</button>
        </div>
      </div>

      <div class="bg-white flex flex-col rounded-3xl shadow-lg hover:scale-105 transition-transform duration-300">

        <div class="m-4 mr-6">
          <h2 class="text-xl font-bold max-[390px]:text-lg">ข้าวผัดกะเพรา</h2>
          <p class="text-orange-500 text-xl font-bold max-[390px]:text-lg">50
            <span class="text-base font-light text-black">บาท</span>
          </p>
        </div>
        <div class="flex justify-end mt-auto">
          <button
            class=" bg-green-500 text-white font-medium text-xl rounded-tl-3xl rounded-br-3xl w-14 h-14 hover:bg-green-700 transition max-[390px]:text-lg">เพิ่ม</button>
        </div>
      </div>

      <div class="bg-white flex flex-col rounded-3xl shadow-lg hover:scale-105 transition-transform duration-300">
        <img src="../img/food-menu5.jpg" alt="food" class="w-full h-36 object-cover rounded-t-3xl">
        <div class="m-4 mr-6">
          <h2 class="text-xl font-bold max-[390px]:text-lg">ข้าวผัดพริกแกง</h2>
          <p class="text-orange-500 text-xl font-bold max-[390px]:text-lg">50
            <span class="text-base font-light text-black">บาท</span>
          </p>
        </div>
        <div class="flex justify-end mt-auto">
          <button
            class=" bg-green-500 text-white font-medium text-xl rounded-tl-3xl rounded-br-3xl w-14 h-14 hover:bg-green-700 transition max-[390px]:text-lg">เพิ่ม</button>
        </div>
      </div>

      <div class="bg-white flex flex-col rounded-3xl shadow-lg hover:scale-105 transition-transform duration-300">
        <img src="../img/food-menu6.jpg" alt="food" class="w-full h-36 object-cover rounded-t-3xl">
        <div class="m-4 mr-6">
          <h2 class="text-xl font-bold max-[390px]:text-lg">สุกี้</h2>
          <p class="text-orange-500 text-xl font-bold max-[390px]:text-lg">50
            <span class="text-base font-light text-black">บาท</span>
          </p>
        </div>
        <div class="flex justify-end mt-auto">
          <button
            class=" bg-green-500 text-white font-medium text-xl rounded-tl-3xl rounded-br-3xl w-14 h-14 hover:bg-green-700 transition max-[390px]:text-lg">เพิ่ม</button>
        </div>
      </div>
    </div>
    </div>

  </main>

  <!-- ตระกร้าของฉัน -->
  <a href="./cart.html">
    <div class="p-6 fixed bottom-0 left-0 right-0 sm:hidden">
      <div class="bg-amber-500 rounded-full p-2 flex space-x-4 items-center hover:bg-amber-600 cursor-pointer">
        <span class="bg-white rounded-full w-12 h-12 inline-flex items-center justify-center text-2xl font-medium">0</span>
        <p class="text-xl font-semibold text-white flex-1 text-center">ตระกร้าของฉัน</p>
        <p class="text-xl font-semibold text-white pr-4">0 บาท</p>
      </div>
    </div>
  </a>
